services:
  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: ${APP_PORT:-8765}
      TRACKING_RPA_ENABLED: ${TRACKING_RPA_ENABLED:-false}
      TRACKING_RPA_BASE_URL: ${TRACKING_RPA_BASE_URL:-}
      TRACKING_RPA_SHARED_SECRET: ${TRACKING_RPA_SHARED_SECRET:-}
      TRACKING_RPA_TIMEOUT_MS: ${TRACKING_RPA_TIMEOUT_MS:-120000}
    volumes:
      - app_data:/app/data
    ports:
      - "${APP_PORT:-8765}:${APP_PORT:-8765}"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dotcom_omnichannel}
      POSTGRES_USER: ${POSTGRES_USER:-dotcom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dotcom-docker-default}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dotcom} -d ${POSTGRES_DB:-dotcom_omnichannel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  omnichannel:
    build:
      context: ./services/omnichannel
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      OMNICHANNEL_PORT: ${OMNICHANNEL_PORT:-8775}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:8775}
      OMNICHANNEL_PUBLIC_URL: ${OMNICHANNEL_PUBLIC_URL:-http://127.0.0.1:8775}
      EXISTING_APP_BASE_URL: http://app:${APP_PORT:-8765}
      DATABASE_URL: postgresql://${POSTGRES_USER:-dotcom}:${POSTGRES_PASSWORD:-dotcom-docker-default}@postgres:5432/${POSTGRES_DB:-dotcom_omnichannel}?schema=public
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://127.0.0.1:8765,http://127.0.0.1:8775}
      SESSION_BRIDGE_SECRET: ${SESSION_BRIDGE_SECRET:-docker-default-session-bridge-secret-change-later}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-docker-default-encryption-key-change-later}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:-docker-default-webhook-token-change-later}
      META_APP_SECRET: ${META_APP_SECRET:-}
      VERIFY_WEBHOOK_SIGNATURES: ${VERIFY_WEBHOOK_SIGNATURES:-true}
      ALLOW_MOCK_ENDPOINTS: ${ALLOW_MOCK_ENDPOINTS:-false}
      ALLOW_QUERY_SESSION_TOKEN: ${ALLOW_QUERY_SESSION_TOKEN:-false}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      FORCE_HTTPS: ${FORCE_HTTPS:-false}
      ENABLE_HSTS: ${ENABLE_HSTS:-false}
      OMNI_START_RETRY_WORKER: "true"
    volumes:
      - omni_uploads:/app/storage/uploads
    ports:
      - "${OMNICHANNEL_PORT:-8775}:${OMNICHANNEL_PORT:-8775}"
    command: ["sh", "-c", "npx prisma migrate deploy && node src/server.js"]

volumes:
  app_data:
  postgres_data:
  omni_uploads:
